<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — lOOk!</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#FFB8C8;--pink-d:#CC3366;
  --mint:#B8EFE4;--mint-d:#1A8070;
  --yellow:#FFF0B0;--yellow-d:#C89000;
  --lav:#C8C8FF;--lav-d:#5050CC;
  --bg:#FFF9F5;--white:#FFFFFF;--dark:#3D3035;--mid:#9A8088;--light:#F5F0F3;
  --font:'Noto Sans KR',-apple-system,sans-serif;
  --dis:'Nunito',var(--font);
  --shadow:0 4px 24px rgba(180,130,200,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background-color:var(--bg);
  background-image:
    repeating-linear-gradient(45deg,rgba(255,184,200,.2) 0 1px,transparent 1px 16px),
    repeating-linear-gradient(-45deg,rgba(184,239,228,.2) 0 1px,transparent 1px 16px),
    radial-gradient(circle,rgba(200,200,255,.18) 3px,transparent 3px);
  background-size:22px 22px,22px 22px,28px 28px;
  padding:24px;
}
.rainbow-top{height:5px;background:linear-gradient(to right,var(--pink) 25%,var(--yellow) 25% 50%,var(--lav) 50% 75%,var(--mint) 75%);position:fixed;top:0;left:0;right:0;z-index:100}
.card{background:var(--white);border-radius:28px;border:2.5px solid var(--pink);box-shadow:var(--shadow);width:100%;max-width:420px;padding:36px 32px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--lav));opacity:.12;pointer-events:none}
.card::after{content:'';position:absolute;bottom:-40px;left:-40px;width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--mint),var(--yellow));opacity:.12;pointer-events:none}

/* LOGO */
.logo{display:flex;align-items:center;gap:3px;justify-content:center;margin-bottom:6px;text-decoration:none}
.lp{height:36px;min-width:33px;padding:0 8px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--dis);font-size:20px;font-weight:900;color:var(--dark)}
.lp-l{background:var(--pink);border-radius:11px 4px 4px 11px}
.lp-o1{background:var(--mint)}.lp-o2{background:var(--yellow)}
.lp-k{background:var(--lav);border-radius:4px 11px 11px 4px}
.lp-x{background:var(--pink);min-width:24px;border-radius:9px;font-size:18px}
.card-ttl{text-align:center;font-size:22px;font-weight:900;font-family:var(--dis);color:var(--dark);margin-bottom:4px}
.card-sub{text-align:center;font-size:13px;color:var(--mid);margin-bottom:28px}

/* FORM */
.field{margin-bottom:14px;position:relative}
.field label{display:block;font-size:12px;font-weight:700;color:var(--mid);margin-bottom:6px}
.field input{
  width:100%;padding:13px 16px;border:2px solid var(--pink);border-radius:14px;
  font-size:15px;font-family:var(--font);color:var(--dark);background:var(--bg);outline:none;
  transition:border-color .15s;
}
.field input:focus{border-color:var(--pink-d)}
.field input::placeholder{color:#D0B8C0}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:46px}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--mid)}
.error-msg{font-size:12px;color:var(--pink-d);margin-top:5px;display:none}
.field.err input{border-color:var(--pink-d)}
.field.err .error-msg{display:block}

/* BUTTONS */
.btn-main{
  width:100%;padding:15px;border-radius:16px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--pink-d),var(--lav-d));
  color:var(--white);font-size:16px;font-weight:900;font-family:var(--dis);
  margin-top:6px;transition:opacity .15s;
}
.btn-main:hover{opacity:.88}
.btn-main:disabled{opacity:.5;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--mid);font-size:12px;font-weight:700}
.divider::before,.divider::after{content:'';flex:1;height:1.5px;background:var(--pink);opacity:.5}
.btn-kakao{
  width:100%;padding:13px;border-radius:14px;border:none;cursor:pointer;
  background:#FEE500;color:#3A1D00;font-size:14px;font-weight:700;font-family:var(--dis);
  display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:opacity .15s;
}
.btn-kakao:hover{opacity:.88}
.btn-google{
  width:100%;padding:13px;border-radius:14px;border:2px solid #E0D0D8;cursor:pointer;
  background:var(--white);color:var(--dark);font-size:14px;font-weight:700;font-family:var(--dis);
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;
}
.btn-google:hover{border-color:var(--pink)}
.g-icon{width:18px;height:18px;display:inline-flex}

.links{display:flex;justify-content:space-between;align-items:center;margin-top:22px;font-size:13px}
.link-btn{color:var(--pink-d);font-weight:700;cursor:pointer;background:none;border:none;font-size:13px;font-family:var(--font)}
.link-btn:hover{text-decoration:underline}

.guest-bar{
  max-width:420px;width:100%;margin-top:14px;
  background:rgba(255,255,255,.7);border:2px dashed var(--pink);border-radius:16px;
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
}
.guest-txt{font-size:13px;color:var(--mid)}
.guest-txt strong{color:var(--dark);font-weight:700}
.guest-btn{font-size:13px;font-weight:700;color:var(--mid);background:var(--light);border:none;border-radius:10px;padding:7px 16px;cursor:pointer;font-family:var(--dis)}
.guest-btn:hover{background:var(--pink);color:var(--dark)}

/* LOADING */
.spinner{display:none;width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-main.loading .btn-text{display:none}
.btn-main.loading .spinner{display:block}
</style>
</head>
<body>
<div class="rainbow-top"></div>

<a href="index.html" class="logo">
  <span class="lp lp-l">l</span>
  <span class="lp lp-o1">O</span>
  <span class="lp lp-o2">O</span>
  <span class="lp lp-k">k</span>
  <span class="lp lp-x">!</span>
</a>

<div class="card">
  <div class="card-ttl">다시 만났어요 👀</div>
  <div class="card-sub">친구들의 구매를 구경하러 가봐요</div>

  <form id="loginForm" onsubmit="doLogin(event)">
    <div class="field" id="emailField">
      <label>이메일</label>
      <input type="email" id="emailInput" placeholder="example@email.com" autocomplete="email">
      <div class="error-msg" id="emailErr">이메일을 확인해주세요</div>
    </div>
    <div class="field" id="pwField">
      <label>비밀번호</label>
      <div class="pw-wrap">
        <input type="password" id="pwInput" placeholder="비밀번호를 입력해주세요" autocomplete="current-password">
        <button type="button" class="pw-toggle" onclick="togglePw('pwInput',this)">👁️</button>
      </div>
      <div class="error-msg" id="pwErr">비밀번호를 확인해주세요</div>
    </div>
    <button type="submit" class="btn-main" id="loginBtn">
      <span class="btn-text">로그인</span>
      <div class="spinner"></div>
    </button>
  </form>

  <div class="divider">또는</div>

  <button class="btn-kakao" onclick="socialLogin('kakao')">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#3A1D00" d="M12 3C6.48 3 2 6.48 2 10.8c0 2.74 1.54 5.14 3.87 6.57l-.99 3.63 4.22-2.78c.94.19 1.9.28 2.9.28 5.52 0 10-3.48 10-7.7S17.52 3 12 3z"/></svg>
    카카오로 로그인
  </button>
  <button class="btn-google" onclick="socialLogin('google')">
    <svg class="g-icon" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
    Google로 로그인
  </button>

  <div class="links">
    <button class="link-btn" onclick="location.href='signup.html'">회원가입</button>
    <button class="link-btn" style="color:var(--mid);font-weight:500" onclick="alert('이메일로 임시 비밀번호를 발송했어요 (준비중)')">비밀번호 찾기</button>
  </div>
</div>

<div class="guest-bar">
  <span class="guest-txt"><strong>둘러만 볼게요</strong> — 로그인 없이 구경</span>
  <button class="guest-btn" onclick="guestLogin()">게스트 입장 →</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=supabase.createClient(
  'https://pgfysjkftzdkebvnmcwr.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnZnlzamtmdHpka2Vidm5tY3dyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NzQ1OTIsImV4cCI6MjA5ODU1MDU5Mn0.5vy6TSPcQzOBh9fQDdYv4fvRel89zH-ynDCNFJu05YI'
);

// 이미 로그인된 경우 바로 이동
sb.auth.getSession().then(({data:{session}})=>{if(session)location.href='index.html';});

function togglePw(id,btn){
  const inp=document.getElementById(id);
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.textContent=show?'🙈':'👁️';
}
function clearErrors(){
  ['emailField','pwField'].forEach(id=>document.getElementById(id).classList.remove('err'));
}

async function doLogin(e){
  e.preventDefault();
  clearErrors();
  const email=document.getElementById('emailInput').value.trim();
  const pw=document.getElementById('pwInput').value;
  let ok=true;
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    document.getElementById('emailField').classList.add('err');
    document.getElementById('emailErr').textContent='올바른 이메일을 입력해주세요';
    ok=false;
  }
  if(!pw||pw.length<6){
    document.getElementById('pwField').classList.add('err');
    document.getElementById('pwErr').textContent='비밀번호는 6자 이상이어야 해요';
    ok=false;
  }
  if(!ok)return;

  const btn=document.getElementById('loginBtn');
  btn.classList.add('loading');btn.disabled=true;

  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){
    btn.classList.remove('loading');btn.disabled=false;
    document.getElementById('pwField').classList.add('err');
    document.getElementById('pwErr').textContent='이메일 또는 비밀번호가 맞지 않아요';
    return;
  }
  location.href='index.html';
}

function socialLogin(provider){
  alert(provider==='kakao'?'카카오 로그인은 Supabase 대시보드에서 OAuth 설정 후 사용 가능해요':'Google 로그인은 Supabase 대시보드에서 OAuth 설정 후 사용 가능해요');
}

function guestLogin(){
  localStorage.setItem('look_guest','1');
  location.href='index.html';
}
</script>
</body>
</html>
